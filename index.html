<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Odyssée</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121212;
      color: white;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 30px;
      background: #121212;
      gap: 20px;
      flex-wrap: wrap;
    }

    .message {
      font-size: 14px;
      color: #dddddd;
    }

    .player {
      text-align: center;
    }

    .player-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .logo img {
      height: 55px;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
      display: block;
      background: white;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="message">🎉 Bienvenue sur l’espace Radio Odyssée</div>

    <div class="player">
      <div class="player-title">🎙️ Radio Odyssée</div>
      <audio controls style="width: 200px; border-radius: 6px;">
        <source src="https://stream.zeno.fm/vwgc5x9nreiuv" type="audio/mpeg">
        Votre navigateur ne supporte pas la lecture audio.
      </audio>
    </div>

    <div class="logo">
      <img src="https://i.imgur.com/cQTcbK2.png" alt="Logo Radio Odyssée">
    </div>
  </div>

  <iframe
    src="https://chat.radioodyssee.com:8444/channel/radioodysseedirect"
    title="Chat Radio Odyssée">
  </iframe>
</body>
</html>
